{% extends "base.html" %}
{% block title %}Register — PokerStats{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card">
    <h1 class="auth-title">&#9824; PokerStats</h1>
    <p class="auth-subtitle">Create your account</p>

    <form method="post" class="form">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username"
               placeholder="Choose a username" required maxlength="32" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password"
               placeholder="At least 4 characters" required minlength="4" />
      </div>
      {% if invite_required %}
      <div class="form-group">
        <label for="invite_code">Invite Code</label>
        <input id="invite_code" name="invite_code" type="text"
               placeholder="Enter invite code" required />
      </div>
      {% endif %}
      <button type="submit" class="btn btn--primary btn--full">Create Account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
