{% extends "base.html" %}
{% block title %}Login — PokerStats{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card">
    <h1 class="auth-title">&#9824; PokerStats</h1>
    <p class="auth-subtitle">Track your wins and losses with friends</p>

    <form method="post" class="form">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username"
               placeholder="Enter username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
               placeholder="Enter password" required />
      </div>
      <button type="submit" class="btn btn--primary btn--full">Sign In</button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="{{ url_for('register') }}">Register</a>
    </p>

    <div class="auth-demo">
      <p><strong>Demo accounts:</strong> alice, bob, charlie, diana &mdash; password: <code>password</code></p>
    </div>
  </div>
</div>
{% endblock %}
